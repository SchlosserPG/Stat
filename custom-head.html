<!-- ============================================================
     Statistics Course Assistant — Floating Chat Bubble
     Appears on every page of the book.
     Set WORKER_URL below to your Cloudflare Worker URL.
     ============================================================ -->
<style>
  /* ── Floating button ── */
  #chat-fab {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4f8ef7, #7c5cfc);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(79, 142, 247, 0.45);
    z-index: 9999;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  #chat-fab:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 28px rgba(79, 142, 247, 0.6);
  }

  #chat-fab svg { width: 24px; height: 24px; color: #fff; }

  /* unread dot */
  #chat-fab-dot {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ff5a5a;
    border: 2px solid #fff;
    display: none;
  }

  /* ── Chat panel ── */
  #chat-panel {
    position: fixed;
    bottom: 96px;
    right: 28px;
    width: 380px;
    max-width: calc(100vw - 40px);
    height: 520px;
    max-height: calc(100vh - 120px);
    background: #0f1117;
    border: 1px solid #2a2f3e;
    border-radius: 16px;
    display: none;
    flex-direction: column;
    z-index: 9998;
    box-shadow: 0 12px 48px rgba(0,0,0,0.5);
    overflow: hidden;
    animation: panelIn 0.25s ease;
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
  }

  #chat-panel.open { display: flex; }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* panel header */
  #chat-panel-header {
    padding: 14px 16px;
    background: #181c27;
    border-bottom: 1px solid #2a2f3e;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  #chat-panel-header .logo {
    width: 30px;
    height: 30px;
    border-radius: 7px;
    background: linear-gradient(135deg, #4f8ef7, #7c5cfc);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    flex-shrink: 0;
  }

  #chat-panel-header .title { flex: 1; }

  #chat-panel-header .title h3 {
    font-size: 13px;
    font-weight: 600;
    color: #e8eaf0;
    margin: 0;
    line-height: 1.2;
  }

  #chat-panel-header .title p {
    font-size: 11px;
    color: #7a8099;
    margin: 0;
    font-family: 'IBM Plex Mono', monospace;
  }

  #chat-close-btn {
    background: none;
    border: none;
    color: #7a8099;
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    transition: color 0.15s;
  }

  #chat-close-btn:hover { color: #e8eaf0; }
  #chat-close-btn svg { width: 16px; height: 16px; }

  /* messages */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  #chat-messages::-webkit-scrollbar { width: 3px; }
  #chat-messages::-webkit-scrollbar-thumb { background: #2a2f3e; border-radius: 3px; }

  .cm {
    display: flex;
    gap: 8px;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cm-av {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
  }

  .cm.user .cm-av  { background: #1e2640; border: 1px solid #2e3a5a; color: #4f8ef7; }
  .cm.bot .cm-av   { background: linear-gradient(135deg, #4f8ef7, #7c5cfc); color: #fff; }
  .cm.error .cm-av { background: #3a1010; color: #ff8a8a; }

  .cm-text {
    flex: 1;
    background: #141720;
    border: 1px solid #2a2f3e;
    border-radius: 10px;
    padding: 8px 11px;
    font-size: 13px;
    line-height: 1.55;
    color: #e8eaf0;
    min-width: 0;
    word-break: break-word;
  }

  .cm.user .cm-text  { background: #1e2640; border-color: #2e3a5a; }
  .cm.error .cm-text { background: #1c1010; border-color: #5a2e2e; color: #ff8a8a; }

  .cm-text p { margin: 0 0 6px; }
  .cm-text p:last-child { margin-bottom: 0; }

  .cm-text code {
    background: #0a0c12;
    border: 1px solid #2a2f3e;
    border-radius: 3px;
    padding: 1px 5px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: #a5c3ff;
  }

  .cm-text pre {
    background: #0a0c12;
    border: 1px solid #2a2f3e;
    border-radius: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 6px 0;
  }

  .cm-text pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 12px;
    color: #c8d8ff;
  }

  .cm-text ul, .cm-text ol { padding-left: 16px; margin: 4px 0; }
  .cm-text li { margin-bottom: 3px; }
  .cm-text strong { color: #fff; font-weight: 600; }

  /* typing dots */
  .typing-dots { display: flex; gap: 3px; align-items: center; padding: 2px 0; }
  .typing-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: #7a8099;
    animation: td 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes td {
    0%,60%,100% { transform: translateY(0); opacity:0.4; }
    30% { transform: translateY(-4px); opacity:1; }
  }

  /* welcome inside panel */
  .panel-welcome {
    text-align: center;
    padding: 20px 10px;
    color: #7a8099;
  }

  .panel-welcome p {
    font-size: 12.5px;
    margin: 0 0 14px;
    line-height: 1.5;
    color: #7a8099;
  }

  .panel-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }

  .panel-chip {
    background: #181c27;
    border: 1px solid #2a2f3e;
    border-radius: 14px;
    padding: 5px 10px;
    font-size: 11.5px;
    color: #7a8099;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'IBM Plex Mono', monospace;
    text-align: left;
  }

  .panel-chip:hover {
    border-color: #4f8ef7;
    color: #4f8ef7;
    background: rgba(79,142,247,0.07);
  }

  /* input row */
  #chat-input-row {
    padding: 10px 12px;
    border-top: 1px solid #2a2f3e;
    background: #181c27;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #chat-input {
    flex: 1;
    background: #0f1117;
    border: 1px solid #2a2f3e;
    border-radius: 8px;
    padding: 8px 11px;
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    color: #e8eaf0;
    resize: none;
    min-height: 36px;
    max-height: 100px;
    outline: none;
    line-height: 1.4;
    transition: border-color 0.2s;
    overflow-y: auto;
  }

  #chat-input:focus { border-color: #4f8ef7; }
  #chat-input::placeholder { color: #7a8099; }

  #chat-send {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: none;
    background: #4f8ef7;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  #chat-send:hover { opacity: 0.85; }
  #chat-send:disabled { opacity: 0.3; cursor: not-allowed; }
  #chat-send svg { width: 15px; height: 15px; }

  /* mobile adjustments */
  @media (max-width: 480px) {
    #chat-panel { right: 12px; bottom: 80px; width: calc(100vw - 24px); }
    #chat-fab   { right: 16px; bottom: 16px; }
  }
</style>

<!-- Floating Action Button -->
<button id="chat-fab" onclick="toggleChat()" title="Course Assistant" aria-label="Open course assistant">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
  </svg>
  <div id="chat-fab-dot"></div>
</button>

<!-- Chat Panel -->
<div id="chat-panel">
  <div id="chat-panel-header">
    <div class="logo">R∑</div>
    <div class="title">
      <h3>Course Assistant</h3>
      <p>R &amp; Statistics</p>
    </div>
    <button id="chat-close-btn" onclick="toggleChat()" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <div id="chat-messages">
    <div class="panel-welcome" id="panel-welcome">
      <p>Ask me anything about R, statistics concepts, or your code.</p>
      <div class="panel-chips">
        <div class="panel-chip" onclick="chipSend(this)">mean vs median?</div>
        <div class="panel-chip" onclick="chipSend(this)">What is skewness?</div>
        <div class="panel-chip" onclick="chipSend(this)">How do I use filter()?</div>
        <div class="panel-chip" onclick="chipSend(this)">Explain na.rm=TRUE</div>
        <div class="panel-chip" onclick="chipSend(this)">How to read a CSV?</div>
        <div class="panel-chip" onclick="chipSend(this)">What is kurtosis?</div>
      </div>
    </div>
  </div>

  <div id="chat-input-row">
    <textarea
      id="chat-input"
      rows="1"
      placeholder="Ask a question…"
      onkeydown="chatKey(event)"
      oninput="chatResize(this)"
    ></textarea>
    <button id="chat-send" onclick="chatSend()" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  // ============================================================
  // Set this to your Cloudflare Worker URL after deploying

  // ============================================================
  var CHAT_WORKER_URL = 'https://statchat.pamela-schlosser.workers.dev';
  // ============================================================

  var chatHistory = [];
  var chatLoading = false;
  var chatIsOpen  = false;

  function toggleChat() {
    chatIsOpen = !chatIsOpen;
    var panel = document.getElementById('chat-panel');
    var dot   = document.getElementById('chat-fab-dot');
    if (chatIsOpen) {
      panel.classList.add('open');
      dot.style.display = 'none';
      setTimeout(function() {
        var inp = document.getElementById('chat-input');
        if (inp) inp.focus();
      }, 100);
    } else {
      panel.classList.remove('open');
    }
  }

  function chipSend(el) {
    var inp = document.getElementById('chat-input');
    inp.value = el.textContent.trim();
    chatSend();
  }

  function chatKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      chatSend();
    }
  }

  function chatResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function mdToHtml(text) {
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_,l,c) {
      return '<pre><code>' + escHtml(c.trim()) + '</code></pre>';
    });
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
    text = text.replace(/(<li>.*<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; });
    text = text.split(/\n{2,}/).map(function(p) {
      p = p.trim();
      if (!p || p.charAt(0) === '<') return p;
      return '<p>' + p.replace(/\n/g,'<br>') + '</p>';
    }).join('');
    return text;
  }

  function addMsg(role, content, typing) {
    var welcome = document.getElementById('panel-welcome');
    if (welcome) welcome.remove();
    var box = document.getElementById('chat-messages');
    var d   = document.createElement('div');
    d.className = 'cm ' + role;
    var av = role==='user' ? 'you' : role==='bot' ? 'ai' : '!';
    if (typing) {
      d.innerHTML = '<div class="cm-av">' + av + '</div>' +
        '<div class="cm-text" id="cm-typing">' +
        '<div class="typing-dots"><span></span><span></span><span></span></div>' +
        '</div>';
    } else {
      var html = role==='user'
        ? '<p>' + escHtml(content) + '</p>'
        : mdToHtml(content);
      d.innerHTML = '<div class="cm-av">' + av + '</div>' +
        '<div class="cm-text">' + html + '</div>';
    }
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
    if (!chatIsOpen && role === 'bot') {
      document.getElementById('chat-fab-dot').style.display = 'block';
    }
  }

  function removeTyping() {
    var t = document.getElementById('cm-typing');
    if (t) t.closest('.cm').remove();
  }

  async function chatSend() {
    if (chatLoading) return;

    var el   = document.getElementById('chat-input');
    var text = el.value.trim();
    if (!text) return;

    addMsg('user', text);
    chatHistory.push({ role: 'user', content: text });
    el.value = '';
    el.style.height = 'auto';

    chatLoading = true;
    document.getElementById('chat-send').disabled = true;
    addMsg('bot', '', true);

    try {
      var res = await fetch(CHAT_WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1024,
          messages: chatHistory
        })
      });

      removeTyping();

      if (!res.ok) {
        var err = await res.json().catch(function() { return {}; });
        var msg = err.error || ('HTTP ' + res.status);
        addMsg('error', res.status === 429
          ? 'Rate limit reached. Please wait a moment and try again.'
          : 'Something went wrong: ' + msg);
        chatHistory.pop();
      } else {
        var data  = await res.json();
        var reply = (data.content && data.content[0] && data.content[0].text) || '(no response)';
        chatHistory.push({ role: 'assistant', content: reply });
        addMsg('bot', reply);
      }

    } catch(err) {
      removeTyping();
      addMsg('error', 'Network error: ' + err.message);
      chatHistory.pop();
    }

    chatLoading = false;
    document.getElementById('chat-send').disabled = false;
  }
</script>
